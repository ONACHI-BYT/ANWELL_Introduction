<!DOCTYPE html>
<html lang="vi" data-theme="serene">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#12564A">
<title>ANWELL Portal — Quản trị nền tảng theo vai trò</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --pine:#12564A;--forest:#0C3F36;--jade:#2E8567;--jade-soft:#4FA184;
  --gold:#B9893B;--gold-soft:#E7CE97;--gold-lift:#F2E2BE;
  --success:#177245;--danger:#B3261E;
  --fd:'Cormorant Garamond',Georgia,serif;--fb:'Be Vietnam Pro',system-ui,sans-serif;
  --s1:4px;--s2:8px;--s3:12px;--s4:16px;--s5:20px;--s6:24px;--s8:32px;--s10:40px;--s12:48px;
  --tap:44px;--ease:cubic-bezier(.4,0,.2,1);--gutter:clamp(16px,3.2vw,36px);--container:1280px;
}
[data-theme="serene"]{--bg:#F3F6F1;--sf:#FFF;--sf2:#E4EFE8;--tx:#14211B;--tx2:#4C6157;--tx3:#8AA396;
 --bd:#DDE7E0;--bd2:#C9D6CE;--hero:linear-gradient(158deg,#0C3F36,#12564A 62%,#164F44);
 --btn:var(--pine);--btnf:#fff;--rs:10px;--rm:14px;--rl:18px;--rx:24px;
 --sh1:0 2px 8px rgba(12,63,54,.05);--sh2:0 10px 28px rgba(12,63,54,.09);--sh3:0 22px 56px rgba(12,63,54,.14)}
[data-theme="onsen"]{--bg:#FAF7F2;--sf:#FFFDFA;--sf2:#F1EBE1;--tx:#2A2520;--tx2:#5D554A;--tx3:#948A7C;
 --bd:#E2D9CB;--bd2:#CBBEA9;--hero:linear-gradient(158deg,#0C3F36,#12564A 70%,#1B5B4C);
 --btn:var(--pine);--btnf:#fff;--rs:4px;--rm:4px;--rl:4px;--rx:6px;--sh1:none;--sh2:none;--sh3:none}
[data-theme="aurora"]{--bg:#0A1512;--sf:#122019;--sf2:#1A2D24;--tx:#EAF4ED;--tx2:#A9C4B5;--tx3:#7B9587;
 --bd:#22382D;--bd2:#31513F;--hero:linear-gradient(158deg,#071310,#0E2A22 60%,#123227);
 --btn:var(--jade-soft);--btnf:#06140F;--rs:10px;--rm:14px;--rl:18px;--rx:24px;
 --sh1:0 2px 10px rgba(0,0,0,.35);--sh2:0 12px 32px rgba(0,0,0,.5);--sh3:0 24px 60px rgba(0,0,0,.62)}
[data-theme="onsen"] .card,[data-theme="onsen"] .sheet{border:1px solid var(--bd)}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--fb);font-size:15px;line-height:1.62;color:var(--tx);background:var(--bg);-webkit-font-smoothing:antialiased}
button,input,select{font-family:inherit;font-size:inherit;color:inherit}
button{background:none;border:none;cursor:pointer}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:4px}
svg{display:block}
h1,h2,h3,.h4{font-family:var(--fd);font-weight:600;line-height:1.16}
h1{font-size:clamp(25px,2.9vw,38px);font-weight:700}
h2{font-size:clamp(22px,2.3vw,29px)}h3{font-size:22px}.h4{font-size:20px}
.em{font-style:italic;color:var(--gold);font-weight:600}
[data-theme="aurora"] .em{color:var(--gold-soft)}
.eyebrow{font-size:10px;font-weight:700;letter-spacing:.26em;text-transform:uppercase;color:var(--tx3)}
.lead{font-size:17px;color:var(--tx2)}
.sm{font-size:13px}.xs{font-size:11.5px;font-weight:600}
.muted{color:var(--tx2)}.faint{color:var(--tx3)}
.note{font-size:12.5px;line-height:1.6;color:var(--tx2)}
.disc{font-size:11.5px;font-style:italic;color:var(--tx3);line-height:1.55;
  margin-top:var(--s3);padding-left:var(--s3);border-left:2px solid var(--bd)}

/* STAGE */
#stage{container-type:inline-size;width:100%;height:100dvh;position:relative;overflow:hidden;
  transform:translateZ(0);background:var(--bg)}
#stage>.app{height:100%;display:flex;flex-direction:column}

.lotus{width:1em;height:1em;flex:none}
.logo{display:inline-flex;align-items:center;gap:.4em;font-family:var(--fd);font-weight:600;color:var(--pine);white-space:nowrap}
.logo .lotus{color:var(--gold);font-size:1.3em}.logo b{font-weight:700;color:var(--gold)}
[data-theme="aurora"] .logo{color:var(--tx)}
[data-theme="aurora"] .logo .lotus,[data-theme="aurora"] .logo b{color:var(--gold-soft)}

.rail{display:none}
.main{flex:1;min-height:0;overflow-y:auto;padding-bottom:calc(78px + env(safe-area-inset-bottom))}
.wrap{max-width:var(--container);margin:0 auto;padding:0 var(--gutter)}
.topbar{position:sticky;top:0;z-index:40;flex:none;padding:var(--s3) var(--gutter);
  display:flex;align-items:center;gap:var(--s2);background:color-mix(in srgb,var(--bg) 88%,transparent);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--bd)}
.topbar .logo{font-size:20px}
.ib{width:var(--tap);height:var(--tap);border-radius:999px;display:grid;place-items:center;color:var(--tx2)}
.ib:hover{background:var(--sf2);color:var(--tx)}.ib svg{width:20px;height:20px}

.who{display:flex;align-items:center;gap:var(--s3);padding:var(--s3);background:var(--sf2);border-radius:var(--rm)}
.who__av{width:38px;height:38px;border-radius:999px;flex:none;display:grid;place-items:center;
  background:var(--hero);color:var(--gold-soft);font-family:var(--fd);font-weight:700;font-size:17px}
.who__t{min-width:0;flex:1}
.who__t b{display:block;font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.who__t span{font-size:11.5px;color:var(--tx2)}
.rolebar{display:flex;gap:var(--s2);overflow-x:auto;padding:var(--s3) var(--gutter);
  scrollbar-width:none;border-bottom:1px solid var(--bd);background:var(--sf)}
.rolebar::-webkit-scrollbar{display:none}
.rolebar button{flex:none;min-height:38px;padding:0 var(--s4);border-radius:999px;border:1.5px solid var(--bd);
  font-size:11.5px;font-weight:700;color:var(--tx2);white-space:nowrap;transition:all .22s var(--ease)}
.rolebar button[aria-pressed="true"]{background:var(--pine);border-color:var(--pine);color:#fff}
[data-theme="aurora"] .rolebar button[aria-pressed="true"]{background:var(--jade-soft);border-color:var(--jade-soft);color:#06140F}

.navgrp{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--tx3);padding:var(--s5) var(--s4) var(--s2)}
.navitem{display:flex;align-items:center;gap:var(--s3);width:100%;min-height:42px;padding:0 var(--s4);
  border-radius:var(--rm);text-align:left;color:var(--tx2);font-size:13px;font-weight:600;position:relative;transition:all .22s var(--ease)}
.navitem svg{width:18px;height:18px;flex:none;stroke-width:1.7}
.navitem:hover{background:var(--sf2);color:var(--tx)}
.navitem[aria-current="page"]{background:var(--sf2);color:var(--pine)}
[data-theme="aurora"] .navitem[aria-current="page"]{color:var(--jade-soft)}
.navitem[aria-current="page"]::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:3px;height:19px;background:var(--gold);border-radius:0 2px 2px 0}
.navitem .sc{margin-left:auto;font-size:9px;font-weight:700;letter-spacing:.08em;color:var(--tx3);text-transform:uppercase}
.navitem.lock{opacity:.5}.navitem.lock:hover{background:transparent;color:var(--tx2)}
.navitem.lock .lk{margin-left:auto;color:var(--tx3)}.navitem.lock .lk svg{width:14px;height:14px}

.lockcard{border:1.5px dashed var(--bd2);border-radius:var(--rl);padding:var(--s6);max-width:600px}
.lockcard__h{display:flex;align-items:center;gap:var(--s3);color:var(--tx3)}
.lockcard__h svg{width:19px;height:19px}
.lockcard h3{margin:var(--s4) 0 var(--s3);color:var(--tx2)}
.lockcard ul{list-style:none;display:flex;flex-direction:column;gap:var(--s2);margin:var(--s3) 0}
.lockcard li{display:flex;gap:var(--s3);font-size:13px;color:var(--tx2)}
.lockcard li::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--tx3);flex:none;margin-top:8px}

.card{background:var(--sf);border-radius:var(--rl);box-shadow:var(--sh1);padding:var(--s5)}
.card--f{box-shadow:none;border:1px solid var(--bd)}
.card--g{border-top:3px solid var(--gold)}
.card--d{background:var(--hero);color:#fff;box-shadow:var(--sh2)}
.card--d .muted,.card--d .faint{color:rgba(255,255,255,.72)}
.card--r{background:color-mix(in srgb,var(--danger) 8%,var(--sf));border-left:4px solid var(--danger)}
.card h3,.card .h4{margin-bottom:var(--s2)}

.kpi{font-family:var(--fd);font-weight:700;font-size:32px;line-height:1;color:var(--pine);letter-spacing:-.02em}
[data-theme="aurora"] .kpi{color:var(--gold-soft)}.kpi--g{color:var(--gold)}
.kpil{font-size:11.5px;font-weight:600;color:var(--tx2);margin-top:var(--s2);line-height:1.4}

/* Bảng xếp ca */
.ros{min-width:660px;border-collapse:separate;border-spacing:3px}
.ros th{padding:var(--s2);text-align:center;font-size:10px}
.ros th:first-child{text-align:left;min-width:130px}
.ros td{padding:0;border:none}
.ros td:first-child{padding:var(--s2) var(--s3);font-size:12.5px;font-weight:600;
  background:var(--sf2);border-radius:var(--rs);vertical-align:middle}
.ros td:first-child small{display:block;font-size:10.5px;font-weight:500;color:var(--tx2);margin-top:1px}
.rc{display:block;padding:var(--s2) 6px;border-radius:var(--rs);font-size:11px;font-weight:600;
  text-align:center;line-height:1.35;min-height:46px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1px}
.rc small{font-size:9.5px;font-weight:500;opacity:.78}
.rc--on{background:color-mix(in srgb,var(--jade) 15%,transparent);color:var(--jade)}
[data-theme="aurora"] .rc--on{color:var(--jade-soft)}
.rc--home{background:var(--gold-lift);color:#7A5A20}
[data-theme="aurora"] .rc--home{background:color-mix(in srgb,var(--gold) 22%,transparent);color:var(--gold-soft)}
.rc--off{background:var(--sf2);color:var(--tx3)}
.rc--gap{background:color-mix(in srgb,var(--danger) 11%,transparent);color:var(--danger);
  border:1.5px dashed color-mix(in srgb,var(--danger) 40%,transparent)}
.leg{display:flex;flex-wrap:wrap;gap:var(--s4);margin-top:var(--s4);font-size:11.5px;color:var(--tx2)}
.leg span{display:inline-flex;align-items:center;gap:6px}
.leg i{width:12px;height:12px;border-radius:3px;display:block}
.assign{display:flex;align-items:center;justify-content:space-between;gap:var(--s3);
  padding:var(--s3) 0;border-bottom:1px solid var(--bd)}
.assign:last-of-type{border-bottom:none}
.assign__t{min-width:0}
.assign__t b{display:block;font-size:13px}
.assign__t span{font-size:11.5px;color:var(--tx2)}
/* Lịch nhận khách */
.wk{display:grid;gap:var(--s2)}
.wkrow{display:grid;grid-template-columns:52px 1fr auto;gap:var(--s3);align-items:center;
  padding:var(--s3);background:var(--sf2);border-radius:var(--rm)}
.wkrow.off{opacity:.5}
.wkd{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--tx2)}
.wkt{font-size:13px;font-weight:600}
.wkt small{display:block;font-size:11px;font-weight:500;color:var(--tx2);margin-top:2px}
.pill{display:inline-flex;align-items:center;gap:5px;min-height:30px;padding:0 12px;border-radius:999px;
  border:1.5px solid var(--bd);font-size:12px;font-weight:600;color:var(--tx2);background:var(--sf)}
.pill.on{background:var(--pine);border-color:var(--pine);color:#fff}
.pill.off{border-style:dashed;color:var(--tx3)}
[data-theme="aurora"] .pill.on{background:var(--jade-soft);border-color:var(--jade-soft);color:#06140F}
.pills{display:flex;flex-wrap:wrap;gap:var(--s2);margin-top:var(--s3)}
.zone{display:flex;justify-content:space-between;gap:var(--s3);padding:var(--s3) 0;border-bottom:1px solid var(--bd);font-size:13px}
.zone:last-child{border-bottom:none}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:480px}
th,td{text-align:left;padding:var(--s3);border-bottom:1px solid var(--bd);vertical-align:top}
th{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--tx3);font-weight:700;border-bottom:1.5px solid var(--bd2)}
td:first-child{font-weight:600}tr:last-child td{border-bottom:none}

.bg{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;
  font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.bg svg{width:12px;height:12px}
.b-v{background:color-mix(in srgb,var(--jade) 14%,transparent);color:var(--jade)}
[data-theme="aurora"] .b-v{color:var(--jade-soft)}
.b-m{background:color-mix(in srgb,var(--pine) 15%,transparent);color:var(--pine)}
[data-theme="aurora"] .b-m{background:color-mix(in srgb,var(--jade-soft) 18%,transparent);color:var(--jade-soft)}
.b-g{background:var(--gold-lift);color:#7A5A20}
[data-theme="aurora"] .b-g{background:color-mix(in srgb,var(--gold) 22%,transparent);color:var(--gold-soft)}
.b-n{background:var(--sf2);color:var(--tx2)}
.b-d{background:#F7E4E2;color:var(--danger)}
[data-theme="aurora"] .b-d{background:color-mix(in srgb,var(--danger) 26%,transparent);color:#F2B5B0}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:var(--s2);min-height:var(--tap);
  padding:0 var(--s5);border-radius:var(--rm);font-size:13px;font-weight:600;white-space:nowrap;transition:all .22s var(--ease)}
.btn svg{width:17px;height:17px}
.btn--p{background:var(--btn);color:var(--btnf);box-shadow:var(--sh1)}
.btn--o{border:1.5px solid var(--bd2);color:var(--tx)}
.btn--o:hover{border-color:var(--pine);color:var(--pine)}
.btn--blk{width:100%}
.btn[disabled]{opacity:.4;pointer-events:none}

.alert{display:flex;gap:var(--s3);padding:var(--s4);border-radius:var(--rm);border-left:4px solid;font-size:13px;line-height:1.6}
.alert svg{width:19px;height:19px;flex:none;margin-top:1px}
.a-s{background:color-mix(in srgb,var(--danger) 9%,var(--sf));border-left-color:var(--danger)}
.a-s b{color:var(--danger)}
.a-i{background:color-mix(in srgb,var(--jade) 10%,var(--sf));border-left-color:var(--jade)}
.a-g{background:color-mix(in srgb,var(--gold) 11%,var(--sf));border-left-color:var(--gold)}

.pg{padding:var(--s6) 0 var(--s10)}
.pghd{margin-bottom:var(--s6)}.pghd h1{margin-top:var(--s2)}.pghd .lead{margin-top:var(--s3);max-width:76ch}
.stack{display:flex;flex-direction:column;gap:var(--s4)}
.grid{display:grid;gap:var(--s4);grid-template-columns:1fr}
.row{display:flex;align-items:center;justify-content:space-between;gap:var(--s4);padding:var(--s3) 0}
.row+.row{border-top:1px solid var(--bd)}
.wbar{height:6px;border-radius:999px;background:var(--sf2);overflow:hidden;flex:none}
.wbar i{display:block;height:100%;background:var(--gold);border-radius:999px}

.tabbar{position:absolute;left:0;right:0;bottom:0;z-index:50;display:grid;
  background:color-mix(in srgb,var(--sf) 94%,transparent);backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);border-top:1px solid var(--bd);padding-bottom:env(safe-area-inset-bottom)}
.tab{min-height:var(--tap);padding:var(--s2) 3px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--tx3);position:relative}
.tab svg{width:20px;height:20px;stroke-width:1.6}
.tab span{font-size:9px;font-weight:600;text-align:center;line-height:1.15}
.tab[aria-current="page"]{color:var(--pine)}
[data-theme="aurora"] .tab[aria-current="page"]{color:var(--jade-soft)}
.tab[aria-current="page"]::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:20px;height:2px;background:var(--gold);border-radius:0 0 2px 2px}

.scrim{position:absolute;inset:0;z-index:80;background:rgba(8,24,19,.5);opacity:0;pointer-events:none;transition:opacity .22s}
.scrim.on{opacity:1;pointer-events:auto}
.sheet{position:absolute;left:0;right:0;bottom:0;z-index:90;background:var(--sf);border-radius:var(--rx) var(--rx) 0 0;
  padding:var(--s5) var(--gutter) var(--s8);box-shadow:var(--sh3);transform:translateY(102%);
  transition:transform .34s var(--ease);max-height:88%;overflow-y:auto}
.sheet.on{transform:none}
.sheet__grab{width:38px;height:4px;border-radius:2px;background:var(--bd2);margin:0 auto var(--s4)}
.toast{position:absolute;left:50%;bottom:92px;z-index:100;transform:translate(-50%,18px);opacity:0;pointer-events:none;
  background:var(--forest);color:#fff;padding:var(--s3) var(--s5);border-radius:999px;font-size:13px;font-weight:600;
  box-shadow:var(--sh3);transition:all .22s var(--ease);max-width:calc(100% - 32px)}
.toast.on{opacity:1;transform:translate(-50%,0)}

/* KHUNG XEM THỬ */
body.pv{background:#0A1512;min-height:100dvh;display:flex;flex-direction:column;align-items:center}
.pvbar{position:sticky;top:0;z-index:200;width:100%;display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  justify-content:center;padding:10px 16px;background:rgba(10,21,18,.93);backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,.09)}
body:not(.pv) .pvbar,body:not(.pv) .pvlabel{display:none}
body:not(.pv) .pvwrap{display:block;padding:0;width:100%}
body:not(.pv) .pvouter{width:100%;height:auto}
.pvg{display:flex;align-items:center;gap:7px}
.pvg>span{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.34);white-space:nowrap}
.pvset{display:flex;gap:3px;background:rgba(255,255,255,.07);padding:3px;border-radius:999px}
.pvset button{min-height:31px;padding:0 11px;border-radius:999px;white-space:nowrap;font-family:var(--fb);
  font-size:11px;font-weight:600;color:rgba(255,255,255,.6);display:inline-flex;align-items:center;gap:6px;transition:all .2s}
.pvset button:hover{color:#fff}
.pvset button[aria-pressed="true"]{background:#B9893B;color:#fff}
.pvset button i{font-style:normal;font-size:9px;opacity:.62;font-weight:500}
.pvsw{width:13px;height:13px;border-radius:50%;border:1.5px solid rgba(255,255,255,.3)}
.pvset button[aria-pressed="true"] .pvsw{border-color:rgba(255,255,255,.85)}
.pvwrap{flex:1;width:100%;display:grid;place-items:center;padding:22px 16px 30px}
.pvouter{position:relative}
.pvouter #stage{border-radius:var(--pvr,24px);box-shadow:0 34px 90px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.07);transform-origin:top left}
.pvlabel{position:absolute;left:0;right:0;bottom:-23px;text-align:center;font-family:var(--fb);font-size:10px;
  font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.3)}
.pvexit,.pvback{min-height:31px;padding:0 13px;border-radius:999px;font-family:var(--fb);font-size:11px;
  font-weight:600;color:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.16)}
.pvexit:hover{color:#fff}
.pvback{position:fixed;right:16px;bottom:16px;z-index:200;background:#0A1512;color:#fff;min-height:40px;
  font-size:12px;box-shadow:0 10px 30px rgba(0,0,0,.35);display:none;align-items:center;gap:7px;border:none}
body:not(.pv) .pvback{display:inline-flex}
@media (max-width:900px){.pvbar{gap:8px;padding:8px 9px}.pvg>span{display:none}}

/* RESPONSIVE — CONTAINER QUERY, 5 TẦNG */
@container (max-width:380px){.app{--gutter:14px}.kpi{font-size:27px}}
@container (min-width:761px){.grid--2{grid-template-columns:1fr 1fr}.grid--3{grid-template-columns:repeat(3,1fr)}}
@container (min-width:1025px){
  #stage>.app{flex-direction:row}
  .tabbar{display:none}
  .rail{display:flex;flex-direction:column;width:262px;flex:none;border-right:1px solid var(--bd);
    background:var(--sf);height:100%;overflow-y:auto}
  .rail__top{padding:var(--s5) var(--s4) 0}
  .rail__top .logo{font-size:23px;padding:0 var(--s3) var(--s5)}

 stage.style.setProperty('--pvr',dev.r+'px');
 stage.style.transform=`scale(${k}) translateZ(0)`;
 outer.style.width=(dev.w*k)+'px';outer.style.height=(dev.h*k)+'px';}
function setDev(b){dev={w:+b.dataset.w,h:+b.dataset.h,r:+b.dataset.r,n:b.dataset.n};
 $$('#pvDev button').forEach(x=>x.setAttribute('aria-pressed',String(x===b)));
 let lb=$('.pvlabel');if(!lb){lb=document.createElement('div');lb.className='pvlabel';outer.appendChild(lb)}
 lb.textContent=`${dev.n} · ${dev.w} × ${dev.h}`;fitStage();}
$('#pvDev').addEventListener('click',e=>{const b=e.target.closest('button');if(b)setDev(b)});
function preview(on){document.body.classList.toggle('pv',on);
 if(on)setDev($('#pvDev button[aria-pressed="true"]')||$$('#pvDev button')[1]);else fitStage()}
$('#pvExit').addEventListener('click',()=>preview(false));
$('#pvBack').addEventListener('click',()=>preview(true));
addEventListener('resize',fitStage,{passive:true});

renderRoles();renderNav();renderPage();preview(innerWidth>=1100);
})();
</script>
