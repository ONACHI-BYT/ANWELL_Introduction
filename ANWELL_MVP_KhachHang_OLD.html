document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

002Fdiv>\n            <div style=\"padding:14px;display:flex;gap:12px;align-items:center\">\n              <div style=\"width:44px;height:44px;border-radius:50%;background:var(--surface2);display:grid;place-items:center;flex:none;font-family:'Cormorant Garamond',serif;font-weight:700;font-size:18px;color:var(--primary)\">K<\u002Fdiv>\n              <div style=\"flex:1;min-width:0\">\n                <div style=\"display:flex;gap:6px;margin-bottom:4px\"><span style=\"font-size:8.5px;font-weight:700;color:#06140F;background:var(--accent-soft);padding:2px 7px;border-radius:99px\">Bậc 3 · Chuyên sâu<\u002Fspan><span style=\"font-size:8.5px;font-weight:700;color:#fff;background:#177245;padding:2px 7px;border-radius:99px\">✓ Xác minh<\u002Fspan><\u002Fdiv>\n                <p style=\"font-weight:600;font-size:14px;color:var(--text)\">KTV Phạm Quốc Khánh<\u002Fp>\n                <p style=\"font-size:11px;color:var(--text2);margin-top:2px\">Hôm nay · 15:00 — dự kiến tới trong 12 phút<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fbutton>\n\n          <p style=\"font:700 9.5px ui-monospace,monospace;letter-spacing:.2em;color:var(--text3);text-transform:uppercase;margin:24px 0 0\">Tìm hiểu dịch vụ<\u002Fp>\n\n          <div style=\"margin-top:12px;border-radius:20px;padding:20px 18px;background:var(--hero);color:var(--hero-text);box-shadow:0 16px 34px -14px rgba(12,63,54,.5)\">\n            <p style=\"font:700 9.5px ui-monospace,monospace;letter-spacing:.2em;color:var(--accent-soft);text-transform:uppercase;margin:0\">Sau xuất viện · người cao tuổi<\u002Fp>\n            <h1 style=\"font-family:'Cormorant Garamond',serif;font-weight:700;font-size:27px;line-height:1.14;margin:8px 0 0\">Kỹ thuật viên đến nhà, <span style=\"font-style:italic;color:var(--accent-soft)\">tiến triển đo được<\u002Fspan><\u002Fh1>\n            <p style=\"font-size:12.5px;line-height:1.6;opacity:.86;margin:10px 0 0\">Bệnh viện dặn tập mỗi ngày nhưng gia đình không được đào tạo. Chúng tôi làm phần cần tay nghề, thiết bị lo những ngày còn lại, và mỗi tuần bạn nhận một báo cáo cho biết người thân có đang khá lên không.<\u002Fp>\n          <\u002Fdiv>\n\n          <p style=\"font:700 9.5px ui-monospace,monospace;letter-spacing:.2em;color:var(--text3);text-transform:uppercase;margin:22px 0 0\">Dành cho<\u002Fp>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px\">\n            <div style=\"padding:13px;border-radius:var(--r-sm);background:var(--surface);border:1px solid var(--card-border);box-shadow:var(--sh)\"><div style=\"font-size:13px;font-weight:600;line-height:1.35\">Sau đột quỵ<\u002Fdiv><div style=\"font-size:10.5px;color:var(--text3);margin-top:3px\">Yếu, liệt nửa người<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding:13px;border-radius:var(--r-sm);background:var(--surface);border:1px solid var(--card-border);box-shadow:var(--sh)\"><div style=\"font-size:13px;font-weight:600;line-height:1.35\">Sau mổ khớp<\u002Fdiv><div style=\"font-size:10.5px;color:var(--text3);margin-top:3px\">Háng, gối, cột sống<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding:13px;border-radius:var(--r-sm);background:var(--surface);border:1px solid var(--card-border);box-shadow:var(--sh)\"><div style=\"font-size:13px;font-weight:600;line-height:1.35\">Người cao tuổi<\u002Fdiv><div style=\"font-size:10.5px;color:var(--text3);margin-top:3px\">Yếu cơ, hay ngã<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding:13px;border-radius:var(--r-sm);background:var(--surface);border:1px solid var(--card-border);box-shadow:var(--sh)\"><div style=\"font-size:13px;font-weight:600;line-height:1.35\">Nằm lâu một chỗ<\u002Fdiv><div style=\"font-size:10.5px;color:var(--text3);margin-top:3px\">Chống cứng khớp, teo cơ<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n\n          <p style=\"font:700 9.5px ui-monospace,monospace;letter-spacing:.2em;color:var(--text3);text-transform:uppercase;margin:22px 0 0\">Cách thức<\u002Fp>\n          <div style=\"margin-top:10px;background:var(--surface);border-radius:var(--r);border:1px solid var(--card-border);box-shadow:var(--sh);padding:4px 15px\">\n            <div style=\"display:flex;gap:13px;align-items:flex-start;padding:14px 0\">\n              <span style=\"width:26px;height:26px;border-radius:50%;background:var(--surface2);color:var(--primary);display:grid;place-items:center;font-size:12px;font-weight:700;flex-shrink:0\">1<\u002Fspan>\n              <div><div style=\"font-size:13.5px;font-weight:600;line-height:1.35\">Đánh giá tại nhà — miễn phí<\u002Fdiv><div style=\"font-size:11.5px;color:var(--text3);line-height:1.5;margin-top:3px\">Dựa trên chỉ định của bác sĩ khi xuất viện. Chốt mục tiêu 12 tuần<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:13px;align-items:flex-start;padding:14px 0;border-top:1px solid var(--border)\">\n              <span style=\"width:26px;height:26px;border-radius:50%;background:var(--surface2);color:var(--primary);display:grid;place-items:center;font-size:12px;font-weight:700;flex-shrink:0\">2<\u002Fspan>\n              <div><div style=\"font-size:13.5px;font-weight:600;line-height:1.35\">Kỹ thuật viên đến nhà 2 buổi mỗi tuần<\u002Fdiv><div style=\"font-size:11.5px;color:var(--text3);line-height:1.5;margin-top:3px\">Vận động khớp, xoa bóp trị liệu, tập đi — theo quy trình có bác sĩ phục hồi chức năng giám sát<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:13px;align-items:flex-start;padding:14px 0;border-top:1px solid var(--border)\">\n              <span style=\"width:26px;height:26px;border-radius:50%;background:var(--surface2);color:var(--primary);display:grid;place-items:center;font-size:12px;font-weight:700;flex-shrink:0\">3<\u002Fspan>\n              <div><div style=\"font-size:13.5px;font-weight:600;line-height:1.35\">Thiết bị lo 5 ngày còn lại<\u002Fdiv><div style=\"font-size:11.5px;color:var(--text3);line-height:1.5;margin-top:3px\">Máy đặt tại nhà, ứng dụng chỉ rõ mỗi tối dùng bao lâu, đặt ở đâu<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <p style=\"font:700 9.5px ui-monospace,monospace;letter-spacing:.2em;color:var(--text3);text-transform:uppercase;margin:22px 0 0\">Báo cáo gửi bạn mỗi tuần<\u002Fp>\n          <div style=\"margin-top:10px;background:var(--surface);border-radius:var(--r);border:1px solid var(--card-border);box-shadow:var(--sh);padding:18px 15px;text-align:center\">\n            <div style=\"font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:700;line-height:1;color:var(--accent)\">+8°<\u002Fdiv>\n            <p style=\"font-size:12px;color:var(--text2);line-height:1.6;margin:10px 0 0\">Tuần này bố nâng tay phải cao hơn tuần trước <b>8 độ<\u002Fb>. Từ khi bắt đầu đã tăng 34 độ.<\u002Fp>\n            <svg sc-camel-view-box=\"0 0 280 74\" sc-camel-preserve-aspect-ratio=\"none\" style=\"width:100%;height:64px;margin-top:12px\">\n              <path d=\"M8,58 L60,52 L112,44 L164,36 L216,26 L272,14\" fill=\"none\" stroke=\"var(--accent)\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n              <circle cx=\"8\" cy=\"58\" r=\"3\" fill=\"var(--accent)\"><\u002Fcircle><circle cx=\"60\" cy=\"52\" r=\"3\" fill=\"var(--accent)\"><\u002Fcircle><circle cx=\"112\" cy=\"44\" r=\"3\" fill=\"var(--accent)\"><\u002Fcircle><circle cx=\"164\" cy=\"36\" r=\"3\" fill=\"var(--accent)\"><\u002Fcircle><circle cx=\"216\" cy=\"26\" r=\"3\" fill=\"var(--accent)\"><\u002Fcircle><circle cx=\"272\" cy=\"14\" r=\"4.5\" fill=\"var(--accent)\"><\u002Fcircle>\n            <\u002Fsvg>\n            <div style=\"display:flex;justify-content:space-between;margin-top:6px;font-size:9px;color:var(--text3)\"><span>Tuần 1<\u002Fspan><span>Tuần 6<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px\">\n            <div style=\"text-align:center;padding:12px 4px;border-radius:var(--r-sm);background:var(--surface2);border:1px solid var(--card-border)\"><div style=\"font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--text)\">58<span style=\"font-size:11px;color:var(--text3)\">m<\u002Fspan><\u002Fdiv><div style=\"font-size:8.5px;color:var(--text3);margin-top:2px\">Đi liên tục<\u002Fdiv><\u002Fdiv>\n            <div style=\"text-align:center;padding:12px 4px;border-radius:var(--r-sm);background:var(--surface2);border:1px solid var(--card-border)\"><div style=\"font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--text)\">8<\u002Fdiv><div style=\"font-size:8.5px;color:var(--text3);margin-top:2px\">Lần đứng dậy<\u002Fdiv><\u002Fdiv>\n            <div style=\"text-align:center;padding:12px 4px;border-radius:var(--r-sm);background:var(--surface2);border:1px solid var(--card-border)\"><div style=\"font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--accent)\">3<span style=\"font-size:11px;color:var(--text3)\">/10<\u002Fspan><\u002Fdiv><div style=\"font-size:8.5px;color:var(--text3);margin-top:2px\">Mức đau<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n\n          <p style=\"font:700 9.5px ui-monospace,monospace;letter-spacing:.2em;color:var(--text3);text-transform:uppercase;margin:22px 0 0\">Gói dịch vụ<\u002Fp>\n          <div style=\"margin-top:10px;display:flex;flex-direction:column;gap:10px\">\n            <div style=\"background:var(--surface);border-radius:var(--r);border:1px solid var(--card-border);box-shadow:var(--sh);padding:15px\">\n              <div style=\"display:flex;justify-content:space-between;align-items:baseline;gap:10px\"><div><div style=\"font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600\">Tăng cường<\u002Fdiv><div style=\"font-size:11px;color:var(--text3);margin-top:2px\">3 buổi mỗi tuần · 4 tuần đầu sau xuất viện<\u002Fdiv><\u002Fdiv><div style=\"text-align:right;flex-shrink:0\"><div style=\"font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:700;color:var(--text)\">5,4tr<\u002Fdiv><div style=\"font-size:9px;color:var(--text3)\">mỗi tháng<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:var(--surface);border-radius:var(--r);border:1px solid var(--accent);box-shadow:var(--sh);padding:15px;position:relative\">\n              <span style=\"position:absolute;top:-9px;left:15px;background:var(--accent);color:#fff;font-size:8.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:3px 9px;border-radius:999px\">Phổ biến nhất<\u002Fspan>\n              <div style=\"display:flex;justify-content:space-between;align-items:baseline;gap:10px\"><div><div style=\"font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600\">Phục hồi<\u002Fdiv><div style=\"font-size:11px;color:var(--text3);margin-top:2px\">2 buổi mỗi tuần · liệu trình 3–6 tháng<\u002Fdiv><\u002Fdiv><div style=\"text-align:right;flex-shrink:0\"><div style=\"font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:700;color:var(--accent)\">2,8tr<\u002Fdiv><div style=\"font-size:9px;color:var(--text3)\">mỗi tháng<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:var(--surface);border-radius:var(--r);border:1px solid var(--card-border);box-shadow:var(--sh);padding:15px\">\n              <div style=\"display:flex;justify-content:space-between;align-items:baseline;gap:10px\"><div><div style=\"font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600\">Duy trì<\u002Fdiv><div style=\"font-size:11px;color:var(--text3);margin-top:2px\">1 buổi mỗi tuần · khi đã ổn định<\u002Fdiv><\u002Fdiv><div style=\"text-align:right;flex-shrink:0\"><div style=\"font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:700;color:var(--text)\">1,4tr<\u002Fdiv><div style=\"font-size:9px;color:var(--text3)\">mỗi tháng<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:var(--surface2);border-radius:var(--r);border:1px solid var(--card-border);padding:15px\">\n              <div style=\"display:flex;justify-content:space-between;align-items:baseline;gap:10px\"><div><div style=\"font-size:13.5px;font-weight:600\">Thuê thiết bị tại nhà<\u002Fdiv><div style=\"font-size:11px;color:var(--text3);margin-top:2px\">Máy ôn thông · giao, lắp và hướng dẫn tận nơi<\u002Fdiv><\u002Fdiv><div style=\"text-align:right;flex-shrink:0\"><div style=\"font-size:15px;font-weight:700;color:var(--text)\">500k<\u002Fdiv><div style=\"font-size:9px;color:var(--text3)\">mỗi tháng<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"font-size:11px;color:var(--text3);line-height:1.6;margin:10px 0 0\">So sánh: thuê người chăm toàn thời gian khoảng 9–10 triệu mỗi tháng, điều dưỡng tại nhà theo ca 1–2,4 triệu mỗi ngày.<\u002Fp>\n\n          <p style=\"font:700 9.5px ui-monospace,monospace;letter-spacing:.2em;color:var(--text3);text-transform:uppercase;margin:22px 0 0\">Người đến nhà bạn<\u002Fp>\n          <div style=\"margin-top:10px;background:var(--surface);border-radius:var(--r);border:1px solid var(--card-border);box-shadow:var(--sh);padding:15px;display:flex;gap:13px;align-items:center\">\n            <span style=\"width:44px;height:44px;border-radius:50%;background:var(--surface2);display:grid;place-items:center;font-size:15px;font-weight:700;color:var(--primary);flex-shrink:0\">H<\u002Fspan>\n            <div style=\"flex:1;min-width:0\"><div style=\"font-size:14px;font-weight:600\">Trần Thu Hà<\u002Fdiv><div style=\"font-size:11px;color:var(--text3);margin-top:2px\">Chứng nhận ANWELL bậc 2 · 1.284 buổi · 81% hộ hoàn thành liệu trình<\u002Fdiv><\u002Fdiv>\n            <span style=\"font-size:8.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--primary);background:var(--surface2);padding:4px 8px;border-radius:999px;flex-shrink:0\">Đã xác minh<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font:700 9.5px ui-monospace,monospace;letter-spacing:.2em;color:var(--text3);text-transform:uppercase;margin:22px 0 0\">Chứng nhận ANWELL Care<\u002Fp>\n          <div style=\"margin-top:10px;background:var(--surface);border-radius:var(--r);border:1px solid var(--card-border);box-shadow:var(--sh);padding:4px 15px\">\n            <div style=\"display:flex;gap:12px;align-items:center;padding:12px 0\">\n              <span style=\"font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--text3);width:22px;text-align:center;flex-shrink:0\">1<\u002Fspan>\n              <div style=\"flex:1\"><div style=\"font-size:13px;font-weight:600\">Chăm sóc cơ bản<\u002Fdiv><div style=\"font-size:10.5px;color:var(--text3);margin-top:2px\">Xoa bóp trị liệu, hỗ trợ sinh hoạt, chống loét do nằm lâu<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:12px;align-items:center;padding:12px 0;border-top:1px solid var(--border)\">\n              <span style=\"font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--accent);width:22px;text-align:center;flex-shrink:0\">2<\u002Fspan>\n              <div style=\"flex:1\"><div style=\"font-size:13px;font-weight:600\">Phục hồi vận động<\u002Fdiv><div style=\"font-size:10.5px;color:var(--text3);margin-top:2px\">Vận động khớp thụ động, tập đi có hỗ trợ, đo chỉ số hồi phục<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:12px;align-items:center;padding:12px 0;border-top:1px solid var(--border)\">\n              <span style=\"font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--text3);width:22px;text-align:center;flex-shrink:0\">3<\u002Fspan>\n              <div style=\"flex:1\"><div style=\"font-size:13px;font-weight:600\">Phục hồi thần kinh<\u002Fdiv><div style=\"font-size:10.5px;color:var(--text3);margin-top:2px\">Ca sau đột quỵ phức tạp — yêu cầu giám sát của bác sĩ phục hồi chức năng<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"font-size:11px;color:var(--text3);line-height:1.6;margin:10px 0 0\">Chương trình đào tạo có bác sĩ phục hồi chức năng giám sát. Kỹ thuật viên chỉ nhận đúng loại ca trong phạm vi bậc chứng nhận của mình, và hồ sơ kết quả từng ca gắn với chứng nhận đó.<\u002Fp>\n          <button sc-camel-on-click=\"{{ goCareCert }}\" style=\"width:100%;min-height:46px;margin-top:10px;border-radius:var(--r-sm);background:transparent;color:var(--primary);border:1px solid var(--primary);font-size:13.5px;font-weight:600\">Xem mẫu chứng nhận<\u002Fbutton>\n\n          <button sc-camel-on-click=\"{{ goCareBook }}\" style=\"width:100%;min-height:50px;margin-top:20px;border-radius:var(--r-sm);background:var(--primary);color:var(--on-primary);font-size:14.5px;font-weight:600\">Đặt buổi đánh giá miễn phí<\u002Fbutton>\n          <p style=\"font-size:10.5px;font-style:italic;color:var(--text3);line-height:1.6;margin:12px 0 0\">ANWELL cung cấp dịch vụ chăm sóc và tập luyện tại nhà theo kế hoạch đã được bác sĩ chỉ định. Đây không phải dịch vụ khám chữa bệnh và không thay thế điều trị y tế. Mọi ước tính tiến triển dựa trên số liệu đo được, không phải cam kết y khoa.<\u002Fp>\n\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isCareBook }}\" hint-placeholder-val=\"{{ true }}\">\n        <div class=\"body pad view\">\n          <div style=\"display:flex;align-items:center;gap:10px;padding:12px 0 4px\">\n            <button sc-camel-on-click=\"{{ goCare }}\" style=\"width:36px;height:36px;border-radius:50%;border:1px solid var(--border);display:grid;place-items:center;color:var(--text2)\"><svg sc-camel-view-box=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M15 5l-7 7 7 7\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n            <span class=\"lo\" style=\"color:var(--text)\">Đặt buổi đánh giá<\u002Fspan>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ isCareForm }}\" hint-placeholder-val=\"{{ true }}\">\n            <h1 style=\"font-family:'Cormorant Garamond',serif;font-weight:700;font-size:25px;line-height:1.15;margin:16px 0 0\">Người thân của bạn <span style=\"font-style:italic;color:var(--accent)\">đang ở tình trạng nào?<\u002Fspan><\u002Fh1>\n            <p style=\"font-size:11.5px;color:var(--text3);line-height:1.55;margin:6px 0 0\">Khai càng rõ, buổi đánh giá càng đúng — và hệ thống chọn đúng kỹ thuật viên có chứng nhận phù hợp.<\u002Fp>\n            <div style=\"display:flex;flex-wrap:wrap;gap:9px;margin-top:12px\">\n              <sc-for list=\"{{ careConds }}\" as=\"c\" hint-placeholder-count=\"4\">\n                <button sc-camel-on-click=\"{{ c.pick }}\" style=\"padding:12px 15px;border-radius:var(--r-sm);font-size:13px;font-weight:600;background:{{ c.bg }};color:{{ c.fg }};border:1px solid {{ c.bd }}\">{{ c.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <p style=\"font:700 9.5px ui-monospace,monospace;letter-spacing:.2em;color:var(--text3);text-transform:uppercase;margin:22px 0 0\">Biểu hiện cụ thể · chọn được nhiều<\u002Fp>\n            <div style=\"display:flex;flex-wrap:wrap;gap:9px;margin-top:10px\">\n              <sc-for list=\"{{ careProbs }}\" as=\"c\" hint-placeholder-count=\"6\">\n                <button sc-camel-on-click=\"{{ c.pick }}\" style=\"padding:11px 14px;border-radius:var(--r-sm);font-size:12.5px;font-weight:600;background:{{ c.bg }};color:{{ c.fg }};border:1px solid {{ c.bd }}\">{{ c.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <p style=\"font:700 9.5px ui-monospace,monospace;letter-spacing:.2em;color:var(--text3);text-transform:uppercase;margin:22px 0 0\">Chỉ định của bác sĩ<\u002Fp>\n            <div style=\"display:flex;flex-direction:column;gap:8px;margin-top:10px\">\n              <sc-for list=\"{{ careDocs }}\" as=\"c\" hint-placeholder-count=\"3\">\n                <button sc-camel-on-click=\"{{ c.pick }}\" style=\"padding:12px 15px;border-radius:var(--r-sm);font-size:13px;font-weight:600;text-align:left;background:{{ c.bg }};color:{{ c.fg }};border:1px solid {{ c.bd }}\">{{ c.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <p style=\"font-size:11px;color:var(--text3);line-height:1.55;margin:8px 0 0\">Kế hoạch chăm sóc xuất phát từ chỉ định của bác sĩ. Nếu có giấy ra viện hoặc đơn tập, hãy chuẩn bị sẵn cho buổi đánh giá.<\u002Fp>\n\n            <p style=\"font:700 9.5px ui-monospace,monospace;letter-spacing:.2em;color:var(--text3);text-transform:uppercase;margin:22px 0 0\">Chống chỉ định · tình trạng cần lưu ý<\u002Fp>\n            <div style=\"display:flex;flex-wrap:wrap;gap:9px;margin-top:10px\">\n              <sc-for list=\"{{ careContras }}\" as=\"c\" hint-placeholder-count=\"6\">\n                <button sc-camel-on-click=\"{{ c.pick }}\" style=\"padding:11px 14px;border-radius:var(--r-sm);font-size:12.5px;font-weight:600;background:{{ c.bg }};color:{{ c.fg }};border:1px solid {{ c.bd }}\">{{ c.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"margin-top:10px;border-radius:var(--r-sm);padding:12px 14px;background:var(--surface);border-left:3px solid var(--accent);box-shadow:var(--sh)\">\n              <p style=\"font-size:11.5px;line-height:1.6;color:var(--text2);margin:0\">Mục này quyết định <b>bậc chứng nhận<\u002Fb> của kỹ thuật viên nhận ca và những kỹ thuật <b>không được thực hiện<\u002Fb> — ví dụ vai có nguy cơ bán trật sau đột quỵ thì không kéo hoặc nâng bằng cẳng tay. Nếu không chắc, chọn \"Không rõ — cần tư vấn\".<\u002Fp>\n            <\u002Fdiv>\n\n            <p style=\"font:700 9.5px ui-monospace,monospace;letter-spacing:.2em;color:var(--text3);text-transform:uppercase;margin:22px 0 0\">Ghi chú thêm · không bắt buộc<\u002Fp>\n            <textarea rows=\"3\" placeholder=\"Thuốc đang dùng, thói quen sinh hoạt, nhà có thang máy hay không...\" style=\"width:100%;margin-top:10px;padding:12px 14px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit;font-size:16px;line-height:1.5;resize:none;box-sizing:border-box\"><\u002Ftextarea>\n\n            <p style=\"font:700 9.5px ui-monospace,monospace;letter-spacing:.2em;color:var(--text3);text-transform:uppercase;margin:18px 0 0\">Khung giờ thuận tiện<\u002Fp>\n            <div style=\"display:flex;gap:9px;margin-top:10px\">\n              <sc-for list=\"{{ careSlots }}\" as=\"c\" hint-placeholder-count=\"2\">\n                <button sc-camel-on-click=\"{{ c.pick }}\" style=\"flex:1;padding:12px 0;border-radius:var(--r-sm);font-size:13px;font-weight:600;background:{{ c.bg }};color:{{ c.fg }};border:1px solid {{ c.bd }}\">{{ c.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <button sc-camel-on-click=\"{{ submitCare }}\" style=\"width:100%;min-height:50px;margin-top:20px;border-radius:var(--r-sm);background:var(--primary);color:var(--on-primary);font-size:14.5px;font-weight:600\">Xác nhận — chúng tôi sẽ gọi lại<\u002Fbutton>\n            <p style=\"font-size:10.5px;font-style:italic;color:var(--text3);line-height:1.6;margin:12px 0 0\">Thông tin chỉ dùng để chuẩn bị buổi đánh giá và điều phối đúng kỹ thuật viên, không chia sẻ cho bên thứ ba. Buổi đánh giá miễn phí và không ràng buộc.<\u002Fp>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ isCareDone }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;flex-direction:column;align-items:center;text-align:center;padding:24px 0 6px\">\n              <span style=\"width:60px;height:60px;border-radius:50%;background:var(--surface2);display:grid;place-items:center\"><svg sc-camel-view-box=\"0 0 24 24\" width=\"28\" height=\"28\" fill=\"none\" stroke=\"var(--primary)\" stroke-width=\"2.2\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n              <h1 style=\"font-family:'Cormorant Garamond',serif;font-weight:700;font-size:26px;margin:14px 0 0\">Đã nhận yêu cầu<\u002Fh1>\n              <p style=\"font-size:12.5px;color:var(--text2);line-height:1.6;margin:6px 0 0;max-width:290px\">Chúng tôi sẽ gọi trong vòng 24 giờ để xếp lịch buổi đánh giá.<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"margin-top:12px;background:var(--surface);border-radius:var(--r);border:1px solid var(--card-border);box-shadow:var(--sh);padding:4px 15px\">\n              <div style=\"display:flex;justify-content:space-between;gap:12px;padding:11px 0\"><span style=\"font-size:12px;color:var(--text3);flex-shrink:0\">Tình trạng<\u002Fspan><span style=\"font-size:12.5px;font-weight:600;text-align:right\">{{ careCondSel }}<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-between;gap:12px;padding:11px 0;border-top:1px solid var(--border)\"><span style=\"font-size:12px;color:var(--text3);flex-shrink:0\">Biểu hiện<\u002Fspan><span style=\"font-size:12.5px;font-weight:600;text-align:right\">{{ careProbsSel }}<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-between;gap:12px;padding:11px 0;border-top:1px solid var(--border)\"><span style=\"font-size:12px;color:var(--text3);flex-shrink:0\">Chỉ định<\u002Fspan><span style=\"font-size:12.5px;font-weight:600;text-align:right\">{{ careDocSel }}<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-between;gap:12px;padding:11px 0;border-top:1px solid var(--border)\"><span style=\"font-size:12px;color:var(--text3);flex-shrink:0\">Cần lưu ý<\u002Fspan><span style=\"font-size:12.5px;font-weight:600;text-align:right;color:var(--accent)\">{{ careContraSel }}<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-between;gap:12px;padding:11px 0;border-top:1px solid var(--border)\"><span style=\"font-size:12px;color:var(--text3);flex-shrink:0\">Khung giờ<\u002Fspan><span style=\"font-size:12.5px;font-weight:600;text-align:right\">{{ careSlotSel }}<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"margin-top:12px;border-radius:var(--r-sm);padding:12px 14px;background:var(--surface2)\">\n              <p style=\"font-size:11.5px;line-height:1.6;color:var(--text2);margin:0\">Dựa trên thông tin đã khai, hệ thống sẽ điều phối kỹ thuật viên có <b>chứng nhận ANWELL đúng bậc<\u002Fb> với ca này. Người đến nhà mang theo hồ sơ chứng nhận để gia đình kiểm tra.<\u002Fp>\n            <\u002Fdiv>\n            <button sc-camel-on-click=\"{{ goCare }}\" style=\"width:100%;min-height:48px;margin-top:16px;border-radius:var(--r-sm);background:var(--primary);color:var(--on-primary);font-size:13.5px;font-weight:600\">Về Chăm sóc tại nhà<\u002Fbutton>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isCareCert }}\" hint-placeholder-val=\"{{ true }}\">\n        <div class=\"body pad view\">\n          <div style=\"display:flex;align-items:center;gap:10px;padding:12px 0 4px\">\n            <button sc-camel-on-click=\"{{ goCare }}\" style=\"width:36px;height:36px;border-radius:50%;border:1px solid var(--border);display:grid;place-items:center;color:var(--text2)\"><svg sc-camel-view-box=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M15 5l-7 7 7 7\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n            <span class=\"lo\" style=\"color:var(--text)\">Chứng nhận ANWELL<\u002Fspan>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:16px;border-radius:20px;padding:2px;background:linear-gradient(150deg,var(--accent),var(--accent-soft) 55%,var(--accent))\">\n            <div style=\"border-radius:18px;background:var(--hero);color:var(--hero-text);padding:26px 20px;text-align:center\">\n              <svg width=\"46\" height=\"46\" sc-camel-view-box=\"0 0 24 24\" style=\"filter:drop-shadow(0 4px 12px rgba(185,137,59,.4))\">\n                <path d=\"M12 3C9 9 9 15 12 22C15 15 15 9 12 3Z\" transform=\"rotate(-56 12 22)\" fill=\"var(--accent-soft)\" opacity=\".5\"><\u002Fpath><path d=\"M12 3C9 9 9 15 12 22C15 15 15 9 12 3Z\" transform=\"rotate(-28 12 22)\" fill=\"var(--accent-soft)\" opacity=\".8\"><\u002Fpath><path d=\"M12 3C9 9 9 15 12 22C15 15 15 9 12 3Z\" fill=\"var(--accent-soft)\"><\u002Fpath><path d=\"M12 3C9 9 9 15 12 22C15 15 15 9 12 3Z\" transform=\"rotate(28 12 22)\" fill=\"var(--accent-soft)\" opacity=\".8\"><\u002Fpath><path d=\"M12 3C9 9 9 15 12 22C15 15 15 9 12 3Z\" transform=\"rotate(56 12 22)\" fill=\"var(--accent-soft)\" opacity=\".5\"><\u002Fpath>\n              <\u002Fsvg>\n              <p style=\"font:700 9px ui-monospace,monospace;letter-spacing:.28em;color:var(--accent-soft);text-transform:uppercase;margin:14px 0 0\">Chứng nhận năng lực<\u002Fp>\n              <h1 style=\"font-family:'Cormorant Garamond',serif;font-weight:700;font-size:26px;line-height:1.15;margin:8px 0 0\">Trần Thu Hà<\u002Fh1>\n              <p style=\"font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;color:var(--accent-soft);margin:4px 0 0\">Chăm sóc hồi phục tại nhà · Bậc 2<\u002Fp>\n              <div style=\"width:44px;height:1px;background:var(--accent-soft);opacity:.5;margin:16px auto\"><\u002Fdiv>\n              <p style=\"font-size:11.5px;line-height:1.7;opacity:.85;text-align:left;margin:0\">Được phép thực hiện: vận động khớp thụ động và có trợ giúp · xoa bóp trị liệu · tập đứng và tập đi có hỗ trợ · đo và ghi chỉ số hồi phục · hướng dẫn gia đình dùng thiết bị tại nhà.<\u002Fp>\n              <p style=\"font-size:11.5px;line-height:1.7;opacity:.85;text-align:left;margin:8px 0 0\">Ngoài phạm vi: ca sau đột quỵ phức tạp thuộc Bậc 3, thực hiện dưới giám sát trực tiếp của bác sĩ phục hồi chức năng.<\u002Fp>\n              <div style=\"display:flex;justify-content:space-between;margin-top:18px;font-size:9.5px;opacity:.7\"><span>Số: AWC-2025-0147<\u002Fspan><span>Hiệu lực: 24 tháng<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:14px;background:var(--surface);border-radius:var(--r);border:1px solid var(--card-border);box-shadow:var(--sh);padding:4px 15px\">\n            <div style=\"display:flex;gap:12px;align-items:flex-start;padding:12px 0\"><span style=\"color:var(--accent);flex-shrink:0\">—<\u002Fspan><div style=\"font-size:12px;line-height:1.55;color:var(--text2)\">Cấp sau khoá đào tạo có bác sĩ phục hồi chức năng thiết kế và giám sát, kèm kỳ thực hành trên ca thật<\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-top:1px solid var(--border)\"><span style=\"color:var(--accent);flex-shrink:0\">—<\u002Fspan><div style=\"font-size:12px;line-height:1.55;color:var(--text2)\">Gia hạn mỗi 24 tháng dựa trên dữ liệu kết quả thực tế, không chỉ thi lý thuyết<\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-top:1px solid var(--border)\"><span style=\"color:var(--accent);flex-shrink:0\">—<\u002Fspan><div style=\"font-size:12px;line-height:1.55;color:var(--text2)\">Hệ thống chỉ điều phối ca nằm trong phạm vi bậc chứng nhận — ràng buộc ở tầng phần mềm, không phụ thuộc tự giác<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n\n          <button sc-camel-on-click=\"{{ goCareBook }}\" style=\"width:100%;min-height:50px;margin-top:16px;border-radius:var(--r-sm);background:var(--primary);color:var(--on-primary);font-size:14.5px;font-weight:600\">Đặt buổi đánh giá miễn phí<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isMe }}\" hint-placeholder-val=\"{{ true }}\">\n        <div class=\"body pad view\">\n          <div style=\"text-align:center;padding:28px 0 6px\">\n            <div style=\"position:relative;width:78px;height:78px;margin:0 auto\">\n              <image-slot id=\"me-avatar\" shape=\"circle\" placeholder=\"Ảnh\" src=\"b16e2daf-998c-4253-a40e-ee0ff71c5652\"><\u002Fimage-slot>\n              <span style=\"position:absolute;right:-2px;bottom:-2px;width:26px;height:26px;border-radius:50%;background:var(--primary);border:2.5px solid var(--surface);display:grid;place-items:center;pointer-events:none\"><svg width=\"13\" height=\"13\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--on-primary)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z\"><\u002Fpath><circle cx=\"12\" cy=\"13\" r=\"4\"><\u002Fcircle><\u002Fsvg><\u002Fspan>\n            <\u002Fdiv>\n            <h1 style=\"font-family:'Cormorant Garamond',serif;font-weight:700;font-size:23px;margin:12px 0 0;color:var(--text)\">Minh Trần<\u002Fh1>\n            <p style=\"font-size:11px;color:var(--text3);margin:2px 0 0\">Người chăm sóc · Thành viên từ 2024<\u002Fp>\n          <\u002Fdiv>\n          <p style=\"font-size:11px;font-weight:700;letter-spacing:.14em;color:var(--text3);margin:22px 0 10px\">KHÔNG GIAN<\u002Fp>\n          <div style=\"display:flex;gap:10px\">\n            <button sc-camel-on-click=\"{{ meGoAche }}\" style=\"flex:1;min-height:60px;padding:12px;border-radius:var(--r);font-size:14px;font-weight:600;background:{{ spSelfBg }};color:{{ spSelfFg }};border:1px solid {{ spSelfBd }};box-shadow:var(--sh)\">Cho tôi<\u002Fbutton>\n            <button sc-camel-on-click=\"{{ meGoCare }}\" style=\"flex:1;min-height:60px;padding:12px;border-radius:var(--r);font-size:14px;font-weight:600;line-height:1.25;background:{{ spCareBg }};color:{{ spCareFg }};border:1px solid {{ spCareBd }};box-shadow:var(--sh)\">Chăm sóc người thân<\u002Fbutton>\n          <\u002Fdiv>\n          <sc-if value=\"{{ meCareActive }}\" hint-placeholder-val=\"{{ true }}\">\n            <p style=\"font-size:11px;font-weight:700;letter-spacing:.14em;color:var(--text3);margin:22px 0 10px\">NGƯỜI ĐANG ĐƯỢC CHĂM SÓC<\u002Fp>\n            <button sc-camel-on-click=\"{{ goCare }}\" style=\"width:100%;text-align:left;display:flex;align-items:center;gap:13px;padding:15px;border-radius:var(--r);background:var(--surface);border:1px solid var(--card-border);box-shadow:var(--sh)\">\n              <span style=\"width:46px;height:46px;border-radius:50%;flex:none;background:var(--surface2);display:grid;place-items:center;font-family:'Cormorant Garamond',serif;font-weight:700;font-size:19px;color:var(--primary)\">M<\u002Fspan>\n              <span style=\"flex:1;min-width:0\"><span style=\"display:block;font-size:15px;font-weight:600;color:var(--text)\">Ông Trần Văn Minh · 72t<\u002Fspan><span style=\"display:block;font-size:11.5px;color:var(--text2);margin-top:2px\">Phục hồi sau đột quỵ · buổi 6/20<\u002Fspan><\u002Fspan>\n              <svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--text3)\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"m9 5 7 7-7 7\"><\u002Fpath><\u002Fsvg>\n            <\u002Fbutton>\n          <\u002Fsc-if>\n          <p style=\"font-size:11px;font-weight:700;letter-spacing:.14em;color:var(--text3);margin:24px 0 10px\">PHONG CÁCH GIAO DIỆN<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:10px\">\n            <sc-for list=\"{{ styleCards }}\" as=\"s\" hint-placeholder-count=\"3\">\n              <button sc-camel-on-click=\"{{ s.pick }}\" style=\"display:flex;align-items:center;gap:13px;padding:12px;border-radius:var(--r-sm);text-align:left;background:var(--surface);border:2px solid {{ s.ring }};box-shadow:var(--sh)\">\n                <span style=\"width:40px;height:50px;border-radius:8px;flex:none;background:{{ s.swatch }};display:grid;place-items:center\"><svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\"><path d=\"M12 3C9 9 9 15 12 22C15 15 15 9 12 3Z\" fill=\"{{ s.dot }}\"><\u002Fpath>< lder-val=\"{{ true }}\">\n        <button sc-camel-on-click=\"{{ toggleSound }}\" aria-label=\"Bật tắt nhạc thư giãn\" style=\"position:absolute;right:14px;bottom:{{ soundBottom }};z-index:40;width:46px;height:46px;border-radius:50%;background:var(--surface);border:1px solid var(--card-border);box-shadow:var(--sh),0 6px 18px rgba(0,0,0,.14);display:grid;place-items:center\">\n          <sc-if value=\"{{ soundOn }}\" hint-placeholder-val=\"{{ true }}\">\n            <span style=\"position:absolute;inset:0;border-radius:50%;border:2px solid var(--accent);animation:ripple 1.9s ease-out infinite\"><\u002Fspan>\n            <span style=\"display:flex;gap:2.5px;align-items:center;height:17px\">\n              <span style=\"width:3px;height:100%;background:var(--accent);border-radius:2px;transform-origin:center;animation:eq .85s ease-in-out infinite\"><\u002Fspan>\n              <span style=\"width:3px;height:100%;background:var(--accent);border-radius:2px;transform-origin:center;animation:eq .85s ease-in-out infinite .28s\"><\u002Fspan>\n              <span style=\"width:3px;height:100%;background:var(--accent);border-radius:2px;transform-origin:center;animation:eq .85s ease-in-out infinite .52s\"><\u002Fspan>\n              <span style=\"width:3px;height:100%;background:var(--accent);border-radius:2px;transform-origin:center;animation:eq .85s ease-in-out infinite .16s\"><\u002Fspan>\n            <\u002Fspan>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ soundOff }}\" hint-placeholder-val=\"{{ true }}\">\n            <svg width=\"21\" height=\"21\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--text2)\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M11 5 6 9H3v6h3l5 4V5Z\"><\u002Fpath><path d=\"m22 9-6 6M16 9l6 6\"><\u002Fpath><\u002Fsvg>\n          <\u002Fsc-if>\n        <\u002Fbutton>\n      <\u002Fsc-if>\n\n      <!-- ══════════ TAB BAR ══════════ -->\n      <sc-if value=\"{{ showTabs }}\" hint-placeholder-val=\"{{ true }}\">\n        <div class=\"tabbar\" style=\"background:var(--tabbar);border-top:1px solid var(--tabborder)\">\n          <button class=\"tb\" sc-camel-on-click=\"{{ goJourney }}\" style=\"color:{{ nav.journey }}\"><svg sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M3 11l9-8 9 8\"><\u002Fpath><path d=\"M5 10v10h14V10\"><\u002Fpath><\u002Fsvg><span>Hành trình<\u002Fspan><\u002Fbutton>\n          <button class=\"tb\" sc-camel-on-click=\"{{ goDiscover }}\" style=\"color:{{ nav.discover }}\"><svg sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"m20 20-3-3\"><\u002Fpath><\u002Fsvg><span>Khám phá<\u002Fspan><\u002Fbutton>\n          <button class=\"tb\" sc-camel-on-click=\"{{ goBook }}\" style=\"color:{{ nav.book }}\"><span style=\"width:44px;height:44px;border-radius:50%;background:var(--primary);display:grid;place-items:center;margin-top:-14px;box-shadow:0 6px 16px -4px var(--primary)\"><svg sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--on-primary)\" stroke-width=\"2.2\" style=\"width:22px;height:22px\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg><\u002Fspan><\u002Fbutton>\n          <button class=\"tb\" sc-camel-on-click=\"{{ goVisits }}\" style=\"color:{{ nav.visits }}\"><svg sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"17\" rx=\"2\"><\u002Frect><path d=\"M3 9h18M8 2v4M16 2v4\"><\u002Fpath><\u002Fsvg><span>Lịch hẹn<\u002Fspan><\u002Fbutton>\n          <button class=\"tb\" sc-camel-on-click=\"{{ goMe }}\" style=\"color:{{ nav.me }}\"><svg sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><circle cx=\"12\" cy=\"8\" r=\"4\"><\u002Fcircle><path d=\"M4 21c0-4 4-6 8-6s8 2 8 6\"><\u002Fpath><\u002Fsvg><span>Tôi<\u002Fspan><\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:760,&quot;height&quot;:980}}\">\nclass Component extends DCLogic {\n  state = { theme:'serene', view:'onboard', ob:1, need:'ache', venue:'center', book:1, careCond:'Sau đột quỵ', careProbs:[], careDoc:'Có giấy ra viện kèm hướng dẫn tập', careContra:[], careSlot:'Sáng (8–11h)', careDone:false, pain:3, booked:false, lang:'vi', goal:'Đau vai gáy', area:'Vai gáy', day:24, slot:'09:00', center:null, prev:'book', sound:false, activeVid:0, videoMuted:true, foodIdx:0, musicMode:'list', musicSel:['t1','t3'], curTrack:null };\n\n  musicTracks = [\n    { id:'t1', title:'Tụng niệm Hanshan', mood:'Thiền · có lời', vocal:true, src:'https://archive.org/download/9hourstibetanhealingsoundssingingbowlsnaturalsoundsgoldformeditationrelaxation/Buddhist%20Chants%20%26%20Peace%20Music%20-%20Hanshan%20Temple.mp3' },\n    { id:'t2', title:'Himalaya tĩnh tại', mood:'Thiền · hoà tấu', vocal:false, src:'https://archive.org/download/9hourstibetanhealingsoundssingingbowlsnaturalsoundsgoldformeditationrelaxation/Tibetan%20Music%20%20Himalayan%20Temple%20%20Instrumental%20Asian%20Music.mp3' },\n    { id:'t3', title:'Sáo thiền an yên', mood:'Thiền · hoà tấu', vocal:false, src:'https://archive.org/download/9hourstibetanhealingsoundssingingbowlsnaturalsoundsgoldformeditationrelaxation/Meditative%20Mind%20%E0%A5%90%20Buddha%20Flute%20Music.mp3' },\n    { id:'t4', title:'Mozart · Rondo Alla Turca', mood:'Cổ điển · dương cầm', vocal:false, src:'https://commons.wikimedia.org/wiki/Special:FilePath/Rondo_Alla_Turka.ogg' },\n    { id:'t5', title:'Beethoven · Moonlight', mood:'Cổ điển · dương cầm', vocal:false, src:'https://commons.wikimedia.org/wiki/Special:FilePath/Beethoven_Moonlight_1st_movement.ogg' },\n  ];\n\n  themes = {\n    serene:'--screen-bg:#F3F6F1;--bg:#F3F6F1;--surface:#FFFFFF;--surface2:#E4EFE8;--text:#14211B;--text2:#4C6157;--text3:#8AA396;--border:#DDE7E0;--accent:#B9893B;--accent-soft:#E7CE97;--accent-tint:#F2E2BE;--primary:#12564A;--on-primary:#ffffff;--r:18px;--r-sm:12px;--hero:linear-gradient(158deg,#0C3F36,#12564A 62%,#164F44);--hero-text:#ffffff;--sh:0 2px 10px rgba(12,63,54,.06);--tabbar:rgba(255,255,255,.94);--tabborder:#DDE7E0;--card-border:transparent',\n    forest:'--screen-bg:radial-gradient(120% 80% at 50% 0%,#123227 0%,#0A1512 70%);--bg:#0A1512;--surface:rgba(255,255,255,.05);--surface2:rgba(46,133,103,.16);--text:#EAF4ED;--text2:#A9C4B5;--text3:#7B9587;--border:#22382D;--accent:#E7CE97;--accent-soft:#E7CE97;--accent-tint:rgba(231,206,151,.14);--primary:#E7CE97;--on-primary:#06140F;--r:18px;--r-sm:14px;--hero:linear-gradient(158deg,#071310,#0E2A22 60%,#123227);--hero-text:#EAF4ED;--sh:0 12px 32px rgba(0,0,0,.4);--tabbar:rgba(10,21,18,.82);--tabborder:#22382D;--card-border:#22382D',\n    clarity:'--screen-bg:#FAF7F2;--bg:#FAF7F2;--surface:#FFFDFA;--surface2:#F1EBE1;--text:#2A2520;--text2:#5D554A;--text3:#948A7C;--border:#E2D9CB;--accent:#B9893B;--accent-soft:#E7CE97;--accent-tint:#F1EBE1;--primary:#12564A;--on-primary:#ffffff;--r:6px;--r-sm:6px;--hero:linear-gradient(158deg,#0C3F36,#12564A 70%,#1B5B4C);--hero-text:#ffffff;--sh:none;--tabbar:#FFFDFA;--tabborder:#E2D9CB;--card-border:#E2D9CB'\n  };\n\n  set(o){ this.setState(o); }\n  go(view){ this.setState({view, book:1, booked:false}); }\n  setHeroEl = (el)=>{ this.heroEl = el; };\n  pickVideo(i){ if(this.state.sound) this.toggleSound(); this.setState({activeVid:i, videoMuted:false, heroDurText:''}, ()=>{ if(this.heroEl){ try{ this.heroEl.muted=false; this.heroEl.currentTime=0; this.heroEl.play(); }catch(e){} } }); }\n  toggleVidMute(){ if(!this.heroEl) return; const m=!this.heroEl.muted; this.heroEl.muted=m; if(!m && this.state.sound) this.toggleSound(); try{ this.heroEl.play(); }catch(e){} this.setState({videoMuted:m}); }\n\n  ensureAudio(){\n    if(this.audioEl) return;\n    const a = new Audio(); a.preload='none'; a.volume=0.0001;\n    a.addEventListener('ended', ()=>this.nextTrack());\n    this.audioEl = a;\n  }\n  trackById(id){ return this.musicTracks.find(t=>t.id===id); }\n  buildQueue(){\n    const all = this.musicTracks.map(t=>t.id);\n    if(this.state.musicMode==='random'){\n      const q=[...all];\n      for(let i=q.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [q[i],q[j]]=[q[j],q[i]]; }\n      return q;\n    }\n    const sel = this.state.musicSel.filter(id=>all.includes(id));\n    return sel.length ? sel : all;\n  }\n  fadeTo(v){\n    if(!this.audioEl) return; const a=this.audioEl; clearInterval(this._fade);\n    const step=(v-a.volume)/12; let n=0;\n    this._fade=setInterval(()=>{ n++; a.volume=Math.min(1,Math.max(0,a.volume+step)); if(n>=12){ a.volume=v; clearInterval(this._fade);} },40);\n  }\n  playFrom(queue, idx){\n    this.queue=queue; this.qi=idx;\n    const t=this.trackById(queue[idx]); if(!t) return;\n    this.ensureAudio();\n    this.audioEl.src=t.src; this.audioEl.volume=0.0001;\n    const p=this.audioEl.play(); if(p&&p.catch) p.catch(()=>{});\n    this.fadeTo(0.6);\n    this.setState({ sound:true, curTrack:t.id });\n  }\n  nextTrack(){ if(!this.queue||!this.queue.length) return; this.playFrom(this.queue, (this.qi+1)%this.queue.length); }\n  toggleSound(){\n    this.ensureAudio();\n    if(this.state.sound){ this.fadeTo(0); setTimeout(()=>{ try{ this.audioEl.pause(); }catch(e){} },520); this.setState({ sound:false }); return; }\n    this.playFrom(this.buildQueue(), 0);\n  }\n  playTrack(id){\n    if(this.state.sound && this.state.curTrack===id){ this.toggleSound(); return; }\n    const q=this.buildQueue(); let i=q.indexOf(id); if(i<0){ q.unshift(id); i=0; }\n    this.playFrom(q, i);\n  }\n  toggleCareArr(k,v){ const a=this.state[k]||[]; this.setState({ [k]: a.includes(v) ? a.filter(x=>x!==v) : [...a,v] }); }\n  toggleSel(id){\n    const sel=[...this.state.musicSel]; const i=sel.indexOf(id);\n    if(i>=0) sel.splice(i,1); else { if(s
